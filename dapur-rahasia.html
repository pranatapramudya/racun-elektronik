<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dapur Rahasia - Admin</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 15px; background: #f4f4f4; }
        .admin-container { background: white; padding: 20px; border-radius: 8px; max-width: 600px; margin: auto; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background: #28a745; color: white; border: none; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .btn-edit { background: #ffc107; color: black; width: auto; padding: 4px 8px; }
        .btn-delete { background: #dc3545; color: white; width: auto; padding: 4px 8px; }
    </style>
</head>
<body>
<div class="admin-container">
    <h2>Gudang Admin</h2>
    <form id="adminForm">
        <input type="hidden" id="editId"><input type="hidden" id="oldImageUrl">
        <label>Gambar Produk:</label><input type="file" id="inputGambar" accept="image/*">
        <label>Nama Produk:</label><input type="text" id="inputNama" required>
        <label>Kategori:</label>
        <select id="inputKategori" required>
            <option value="Setup Gaming">Setup Gaming</option>
            <option value="Gadget">Gadget</option>
            <option value="Kamar">Kamar</option>
        </select>
        <label>Link Shopee/TikTok:</label><input type="url" id="inputLink" required>
        <button type="submit" id="btnSubmit">Simpan Barang</button>
    </form>
    <div style="overflow-x:auto;">
        <table>
            <thead><tr><th>Foto</th><th>Nama</th><th>Kategori</th><th>Aksi</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const supabaseUrl = 'https://svfaoiofpyzovkdqrsqo.supabase.co';
    const supabaseKey = 'sb_publishable_LIGKz-_pNueJeC054YMMDg_PjtG1FCQ';
    const supabase = createClient(supabaseUrl, supabaseKey, { global: { headers: { 'apikey': supabaseKey, 'Authorization': `Bearer ${supabaseKey}` } } });

    const form = document.getElementById('adminForm');
    const tableBody = document.getElementById('tableBody');
    const btnSubmit = document.getElementById('btnSubmit');

    async function loadData() {
        const { data } = await supabase.from('produk').select('*').order('id', { ascending: false });
        tableBody.innerHTML = '';
        data.forEach(item => {
            tableBody.innerHTML += `<tr>
                <td><img src="${item.gambar}" width="40"></td>
                <td>${item.nama}</td><td>${item.kategori}</td>
                <td>
                    <button class="btn-edit" onclick="editData(${item.id}, '${item.nama}', '${item.kategori}', '${item.gambar}', '${item.link}')">E</button>
                    <button class="btn-delete" onclick="hapusData(${item.id})">X</button>
                </td>
            </tr>`;
        });
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        btnSubmit.innerText = 'Proses...';
        const id = document.getElementById('editId').value;
        const fileInput = document.getElementById('inputGambar');
        let finalImageUrl = document.getElementById('oldImageUrl').value; 

        if (fileInput.files.length > 0) {
            const file = fileInput.files[0];
            const fileName = `${Date.now()}-${file.name.replace(/\s+/g, '-')}`; 
            await supabase.storage.from('gambar').upload(fileName, file);
            finalImageUrl = supabase.storage.from('gambar').getPublicUrl(fileName).data.publicUrl;
        }

        const payload = { nama: document.getElementById('inputNama').value, kategori: document.getElementById('inputKategori').value, gambar: finalImageUrl, link: document.getElementById('inputLink').value };
        if (id) await supabase.from('produk').update(payload).eq('id', id);
        else await supabase.from('produk').insert([payload]);

        form.reset(); document.getElementById('editId').value = ''; loadData();
        btnSubmit.innerText = 'Simpan Barang';
    });

    window.editData = (id, n, k, g, l) => {
        document.getElementById('editId').value = id; document.getElementById('inputNama').value = n;
        document.getElementById('inputKategori').value = k; document.getElementById('oldImageUrl').value = g;
        document.getElementById('inputLink').value = l; window.scrollTo(0,0);
    }
    window.hapusData = async (id) => { if(confirm("Hapus?")) { await supabase.from('produk').delete().eq('id', id); loadData(); } }
    loadData();
</script>
</body>
</html>
