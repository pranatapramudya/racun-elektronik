<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dapur Admin - Login Pro</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 12px; max-width: 500px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; }
        button { background: #28a745; color: white; font-weight: bold; cursor: pointer; border: none; }
        #admin-content { display: none; max-width: 800px; }
        .thumb { width: 50px; height: 50px; object-fit: cover; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
        th, td { border: 1px solid #eee; padding: 10px; }
    </style>
</head>
<body>

<div id="login-box" class="box">
    <h2 style="text-align:center;">🔒 Admin Login</h2>
    <input type="email" id="email" placeholder="Email Admin">
    <input type="password" id="password" placeholder="Password">
    <button onclick="handleLogin()">Masuk ke Gudang</button>
</div>

<div id="admin-content" class="box">
    <div style="display:flex; justify-content: space-between; align-items: center;">
        <h2>📦 Kelola Produk</h2>
        <button onclick="handleLogout()" style="width:auto; background:#dc3545; padding:5px 15px;">Logout</button>
    </div>
    
    <form id="productForm">
        <input type="hidden" id="editId"><input type="hidden" id="oldImg">
        <input type="file" id="inpFile" accept="image/*">
        <input type="text" id="inpNama" placeholder="Nama Produk" required>
        <select id="inpKat">
            <option value="Setup Gaming">Setup Gaming</option>
            <option value="Gadget">Gadget</option>
            <option value="Kamar">Kamar</option>
        </select>
        <input type="url" id="inpLink" placeholder="Link Affiliate" required>
        <button type="submit" id="btnSave">Simpan Produk</button>
    </form>

    <table>
        <thead><tr><th>Foto</th><th>Nama</th><th>Aksi</th></tr></thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const supabase = createClient('https://svfaoiofpyzovkdqrsqo.supabase.co', 'sb_publishable_LIGKz-_pNueJeC054YMMDg_PjtG1FCQ');

    const loginBox = document.getElementById('login-box');
    const adminContent = document.getElementById('admin-content');

    // 1. CEK LOGIN
    async function checkUser() {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) { loginBox.style.display='none'; adminContent.style.display='block'; loadData(); }
    }

    // 2. PROSES LOGIN
    window.handleLogin = async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) alert("Gagal: " + error.message);
        else location.reload();
    };

    // 3. LOGOUT
    window.handleLogout = async () => { await supabase.auth.signOut(); location.reload(); };

    // 4. LOAD DATA
    async function loadData() {
        const { data } = await supabase.from('produk').select('*').order('id', {ascending:false});
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        data.forEach(item => {
            tbody.innerHTML += `<tr>
                <td><img src="${item.gambar}" class="thumb"></td>
                <td>${item.nama}</td>
                <td>
                    <button style="background:#ffc107; color:black; width:auto; padding:3px 8px;" onclick="editBarang(${item.id}, '${item.nama}', '${item.kategori}', '${item.gambar}', '${item.link}')">Edit</button>
                </td>
            </tr>`;
        });
    }

    // 5. SIMPAN DATA (INSERT/UPDATE)
    document.getElementById('productForm').onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('editId').value;
        let imgUrl = document.getElementById('oldImg').value;
        const file = document.getElementById('inpFile').files[0];

        if (file) {
            const fName = `${Date.now()}-${file.name}`;
            await supabase.storage.from('gambar').upload(fName, file);
            imgUrl = supabase.storage.from('gambar').getPublicUrl(fName).data.publicUrl;
        }

        const payload = { 
            nama: document.getElementById('inpNama').value, 
            kategori: document.getElementById('inpKat').value, 
            gambar: imgUrl, 
            link: document.getElementById('inpLink').value 
        };

        if (id) await supabase.from('produk').update(payload).eq('id', id);
        else await supabase.from('produk').insert([payload]);

        location.reload();
    };

    window.editBarang = (id, n, k, g, l) => {
        document.getElementById('editId').value = id;
        document.getElementById('inpNama').value = n;
        document.getElementById('inpKat').value = k;
        document.getElementById('oldImg').value = g;
        document.getElementById('inpLink').value = l;
    };

    checkUser();
</script>
</body>
</html>
