<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dapur Rahasia - Admin PIN</title>
    <style>
        #secure-content { display: none; }
        body { font-family: Arial, sans-serif; padding: 15px; background: #f4f4f4; margin: 0; }
        .admin-container { background: white; padding: 20px; border-radius: 12px; max-width: 600px; margin: auto; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button#btnSubmit { background: #28a745; color: white; border: none; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
        .thumb { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; }
        .btn-edit { background: #ffc107; border: none; padding: 5px; cursor: pointer; }
        .btn-delete { background: #dc3545; color: white; border: none; padding: 5px; cursor: pointer; }
    </style>
</head>
<body>
<div id="secure-content">
    <div class="admin-container">
        <h2>📦 Admin Gudang</h2>
        <form id="adminForm">
            <input type="hidden" id="editId"><input type="hidden" id="oldImageUrl">
            <label>Gambar:</label><input type="file" id="inputGambar" accept="image/*">
            <label>Nama:</label><input type="text" id="inputNama" required>
            <label>Kategori:</label>
            <select id="inputKategori" required>
                <option value="Setup Gaming">Setup Gaming</option>
                <option value="Gadget">Gadget</option>
                <option value="Kamar">Kamar</option>
            </select>
            <label>Link:</label><input type="url" id="inputLink" required>
            <button type="submit" id="btnSubmit">Simpan Produk</button>
        </form>
        <div style="overflow-x:auto;">
            <table>
                <thead><tr><th>Foto</th><th>Nama</th><th>Kategori</th><th>Aksi</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <div id="admin-nav" style="margin-top: 15px; text-align: center;"></div>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const PIN_BENAR = "5225";
    const userPin = prompt("Masukkan PIN Admin:");
    if (userPin !== PIN_BENAR) { window.location.href = "index.html"; } 
    else { document.getElementById('secure-content').style.display = "block"; }

    const supabaseUrl = 'https://svfaoiofpyzovkdqrsqo.supabase.co';
    const supabaseKey = 'sb_publishable_LIGKz-_pNueJeC054YMMDg_PjtG1FCQ';
    const supabase = createClient(supabaseUrl, supabaseKey, { global: { headers: { 'apikey': supabaseKey, 'Authorization': `Bearer ${supabaseKey}` } } });

    const form = document.getElementById('adminForm');
    const tableBody = document.getElementById('tableBody');
    const btnSubmit = document.getElementById('btnSubmit');
    let currentPage = 0; const itemsPerPage = 10;

    async function loadData() {
        const from = currentPage * itemsPerPage; const to = from + itemsPerPage - 1;
        const { data, count, error } = await supabase.from('produk').select('*', {count:'exact'}).order('id', {ascending:false}).range(from, to);
        if (error) return;
        tableBody.innerHTML = '';
        data.forEach(item => {
            tableBody.innerHTML += `<tr>
                <td><img src="${item.gambar}" class="thumb"></td>
                <td>${item.nama}</td><td>${item.kategori}</td>
                <td>
                    <button class="btn-edit" onclick="editData(${item.id}, '${item.nama.replace(/'/g, "\\'")}', '${item.kategori}', '${item.gambar}', '${item.link}')">Edit</button>
                    <button class="btn-delete" onclick="hapusData(${item.id})">Hapus</button>
                </td>
            </tr>`;
        });
        renderNav(count);
    }

    function renderNav(total) {
        const totalPages = Math.ceil(total / itemsPerPage);
        const nav = document.getElementById('admin-nav');
        nav.innerHTML = `
            <button onclick="changePage(-1)" ${currentPage === 0 ? 'disabled' : ''} style="width:auto;">Prev</button>
            <span> ${currentPage+1} / ${totalPages} </span>
            <button onclick="changePage(1)" ${currentPage >= totalPages-1 ? 'disabled' : ''} style="width:auto;">Next</button>
        `;
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault(); btnSubmit.innerText = 'Wait...';
        const id = document.getElementById('editId').value;
        const fileInput = document.getElementById('inputGambar');
        let finalImageUrl = document.getElementById('oldImageUrl').value;
        if (fileInput.files.length > 0) {
            const file = fileInput.files[0];
            const fileName = `${Date.now()}-${file.name.replace(/\s+/g, '-')}`;
            await supabase.storage.from('gambar').upload(fileName, file);
            finalImageUrl = supabase.storage.from('gambar').getPublicUrl(fileName).data.publicUrl;
        }
        const payload = { nama: document.getElementById('inputNama').value, kategori: document.getElementById('inputKategori').value, gambar: finalImageUrl, link: document.getElementById('inputLink').value };
        if (id) await supabase.from('produk').update(payload).eq('id', id);
        else await supabase.from('produk').insert([payload]);
        form.reset(); document.getElementById('editId').value = ''; loadData();
        btnSubmit.innerText = 'Simpan Produk';
    });

    window.editData = (id, n, k, g, l) => {
        document.getElementById('editId').value = id; document.getElementById('inputNama').value = n;
        document.getElementById('inputKategori').value = k; document.getElementById('oldImageUrl').value = g;
        document.getElementById('inputLink').value = l; window.scrollTo(0,0);
    };
    window.hapusData = async (id) => { if(confirm("Hapus?")) { await supabase.from('produk').delete().eq('id', id); loadData(); } };
    window.changePage = (dir) => { currentPage += dir; loadData(); };
    loadData();
</script>
</body>
</html>
