<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Katalog Racun Shopee</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="sticky-header">
        <div class="header-top">
            <h1>⚡ Racun Shopee Pranajaya</h1>
            <p>Pilihan Terbaik Untukmu</p>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="🔍 Cari nama atau ketik nomor...">
        </div>

        <nav class="categories-wrapper">
            <div class="categories" id="categoryList">
                <button class="cat-btn active" onclick="filterCategory('Semua', this)">Semua</button>
                <button class="cat-btn" onclick="filterCategory('Setup Gaming', this)">Setup Gaming</button>
                <button class="cat-btn" onclick="filterCategory('Gadget', this)">Gadget</button>
                <button class="cat-btn" onclick="filterCategory('Kamar', this)">Kamar</button>
            </div>
        </nav>
    </header>

    <main class="container">
        <div id="product-grid" class="product-grid">
            </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
